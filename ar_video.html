<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-transparent-video-shader@1.0.3/dist/aframe-transparent-video-shader.umd.js"></script>
<script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.7.5/aframe/build/aframe-ar.js"></script>
<!-- <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script> -->

<style>
    .button {
        background-color: green;
        border: none;
        color: white;
        padding: 7px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 12px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 12px;
        border: 2px solid rgba(9, 148, 28, 0.54);
        box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0 0.19);
    }
</style>

<div style="position: fixed;top: 10px;width: 100%;text-align: center;z-index: 1;">
    <button class="button" id="btn01">Play Video</button>
    <button class="button" id="btn02">Stop Video</button>
</div>

<meta name="apple-mobile-web-app-capable" content="yes">

<body style='margin : 0px; overflow: hidden;'>
    <a-scene vr-mode-ui="enabled: false;" embedded arjs='sourceType: webcam; debugUIEnabled: false;'>

        <a-marker type='pattern' url='assets/marker/pattern-marker.patt'>
            <!-- <a-entity position='0 0 0' rotation="270 0 0" scale="5 5 5" gltf-model="url(assets/test_model/bird.gltf)"></a-entity> -->
            <video id="myvideo" crossOrigin="anonymous" type="video/mp4" playsinline webkit-playsinline autoplay loop="true" controls="true" muted="true" src="assets/videos/01_heroin.mp4"></video>
            <a-video src="#myvideo" material="shader: transparent-video" width="9" height="16" scale="0.15 0.15 0.15" position="0 -2 -1.5" rotation="-90 0 0" play="true"></a-video>
            <script>
                document.getElementById("btn01").addEventListener("click", (e) => {
                    var v = document.querySelector("#myvideo").play();
                })
                document.getElementById("btn02").addEventListener("click", (e) => {
                    var v = document.querySelector("#myvideo").pause();
                })
            </script>
        </a-marker>
    </a-scene>

</body>
