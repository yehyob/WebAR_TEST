<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
<!-- <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.7.5/aframe/build/aframe-ar.js"></script> -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<style>
    .button {
        background-color: green;
        border: none;
        color: white;
        padding: 7px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 12px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 12px;
        border: 2px solid rgba(9, 148, 28, 0.54);
        box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0 0.19);
    }
</style>

<div style="position: fixed;top: 10px;width: 100%;text-align: center;z-index: 1;">
    <button class="button" id="btnPlay">Play Video</button>
</div>

<meta name="apple-mobile-web-app-capable" content="yes">

<body style='margin : 0px; overflow: hidden;'>
    <a-scene vr-mode-ui='enabled: false;' renderer="logarithmicDepthBuffer: true; precision: medium;" embedded arjs='trackingMethod: best; sourceType: webcam; debugUIEnabled: false;'>
        <!-- 05 Marijuana -->
        <a-nft type='nft' url='https://yehyob.github.io/WebAR_TEST/assets/nft/marijuana_nft/marijuana_nft' smooth='true' smoothCount='10' smoothTolerance='0.01' smoothThreshold='5'>
            <video id="myvideo_marijuana" crossOrigin="anonymous" type="video/mp4" playsinline webkit-playsinline autoplay loop="true" controls="true" muted="true" src="assets/videos/05_marijuana.mp4"></video>
            <a-video material="shader: chromakey; src: #myvideo_marijuana; color: 1 0 1" width="16" height="16" scale="35 35 35" position="120 -30 -100" rotation="-90 0 0" play="true"></a-video>
        </a-nft>
        <!-- 06 Ketamine -->
        <a-nft type='nft' url='https://yehyob.github.io/WebAR_TEST/assets/nft/ketamine_nft/ketamine_nft' smooth='true' smoothCount='10' smoothTolerance='0.01' smoothThreshold='5'>
            <video id="myvideo_ketamine" crossOrigin="anonymous" type="video/mp4" playsinline webkit-playsinline autoplay loop="true" controls="true" muted="true" src="assets/videos/06_ketamine.mp4"></video>
            <a-video material="shader: chromakey; src: #myvideo_ketamine; color: 1 0 1" width="16" height="16" scale="35 35 35" position="120 -30 -100" rotation="-90 0 0" play="true"></a-video>
        </a-nft>

        <script>
            document.getElementById("btnPlay").addEventListener("click", (e) => {
                var v1 = document.querySelector("#myvideo_marijuana").play();
                var v2 = document.querySelector("#myvideo_ketamine").play();
            })
            document.body.addEventListener("click", (e) => {
                var v1 = document.querySelector("#myvideo_marijuana").play();
                var v2 = document.querySelector("#myvideo_ketamine").play();
            })
        </script>
    </a-scene>

</body>
